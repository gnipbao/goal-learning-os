name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate skill package
        run: python3 scripts/check_skill_package.py
      - name: Validate JSON
        run: python3 -m json.tool test-prompts.json > /tmp/test-prompts.json
      - name: Compile scripts
        run: python3 -m py_compile scripts/check_learning_repo.py scripts/check_skill_package.py
